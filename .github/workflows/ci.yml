name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  macos:
    name: macOS
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show Swift version
        run: swift --version

      - name: Run checks
        run: make check

      - name: Run release packaging smoke test
        run: make release-test VERSION=1.0.0
